apiVersion: apps/v1
kind: Deployment

metadata:
  name: nginx
  # this are replicaset labels
  labels:
    purpose: headless-svc-demo
    project: roboshop

spec:
  replicas: 4
  selector:
  # this labels are used to select the pods
    matchLabels:
       purpose: headless-svc-demo
       project: roboshop
  # pod defination
  template:
    metadata:
      labels:
        purpose: headless-svc-demo
        project: roboshop

    spec:
      containers:
      - name: nginx
        image: nginx:latest
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
spec:
  selector:
    purpose: headless-svc-demo
    project: roboshop
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-headless
spec:
# if a service has clusterip none then it is called headless service
  clusterIp: None
  selector:
    purpose: headless-svc-demo
    project: roboshop
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80